<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <div class="shell__brand-mark">SF</div>
      <div>
        <p class="shell__eyebrow">Salon Scheduling</p>
        <h1>Studio Flow</h1>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="shell__section-intro">
      <p class="shell__eyebrow">Workspace</p>
      <p>Core operations</p>
    </div>

    <nav class="shell__nav" mat-nav-list>
      @for (item of navigationItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="shell__note">
      <p class="shell__eyebrow">Feedback</p>
      <h2>Issues or feedback?</h2>
      <p>Let us know at support@developer.local</p>
    </div>
  </aside>

  <div class="shell__workspace">
    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
