<app-page-header
  eyebrow="Scheduling"
  title="Appointments calendar"
  description="Review live appointments by range, filter by professional, and prepare the scheduling flow."
></app-page-header>

<app-calendar-toolbar
  [professionals]="professionalOptions()"
  [rangeLabel]="rangeLabel()"
  [selectedProfessionalId]="selectedProfessionalId()"
  [selectedView]="selectedView()"
  (nextRequested)="showNextRange()"
  (previousRequested)="showPreviousRange()"
  (professionalChanged)="updateProfessionalFilter($event)"
  (todayRequested)="showToday()"
  (viewChanged)="updateView($event)"
></app-calendar-toolbar>

<app-appointment-schedule-board
  [appointmentGroups]="appointmentGroups()"
  [errorMessage]="errorMessage()"
  [isLoading]="isLoading()"
  [rangeLabel]="rangeLabel()"
></app-appointment-schedule-board>
