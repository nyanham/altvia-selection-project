<app-page-header
  title="Clients"
  actionLabel="Add client"
  (actionClicked)="openCreateDialog()"
></app-page-header>

<app-client-table
  [clients]="clients()"
  [errorMessage]="errorMessage()"
  [isLoading]="isLoading()"
  (deleteRequested)="deleteClient($event)"
  (editRequested)="openEditDialog($event)"
></app-client-table>
