<app-page-header
  eyebrow="Professionals"
  title="Professional management"
  description="Maintain staff profiles, specialties, color coding, and future calendar capacity settings."
  actionLabel="Add professional"
  (actionClicked)="openCreateDialog()"
></app-page-header>

<app-professional-table
  [professionals]="professionals()"
  [errorMessage]="errorMessage()"
  [isLoading]="isLoading()"
  (deleteRequested)="deleteProfessional($event)"
  (editRequested)="openEditDialog($event)"
></app-professional-table>
