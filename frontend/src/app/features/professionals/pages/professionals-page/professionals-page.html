<app-page-header
  title="Professionals"
  actionLabel="Add professional"
  (actionClicked)="openCreateDialog()"
></app-page-header>

<app-professional-table
  [professionals]="professionals()"
  [errorMessage]="errorMessage()"
  [isLoading]="isLoading()"
  (deleteRequested)="deleteProfessional($event)"
  (editRequested)="openEditDialog($event)"
></app-professional-table>
