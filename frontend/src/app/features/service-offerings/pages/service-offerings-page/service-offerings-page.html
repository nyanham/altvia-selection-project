<app-page-header
  title="Services"
  actionLabel="Add service"
  (actionClicked)="openCreateDialog()"
></app-page-header>

<app-service-offering-table
  [serviceOfferings]="serviceOfferings()"
  [errorMessage]="errorMessage()"
  [isLoading]="isLoading()"
  (deleteRequested)="deleteServiceOffering($event)"
  (editRequested)="openEditDialog($event)"
></app-service-offering-table>
